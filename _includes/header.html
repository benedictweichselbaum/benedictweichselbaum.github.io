<header class="site-header">
  <div class="wrap nav">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span class="dot"></span>
      <span class="full">Benedict Weichselbaum</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      {%- assign path = page.url -%}
      <a href="{{ '/' | relative_url }}" {% if path == '/' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/cv/' | relative_url }}" {% if path contains '/cv' %}class="active"{% endif %}>CV</a>
      <a href="{{ '/writing/' | relative_url }}" {% if path contains '/writing' or page.layout == 'post' %}class="active"{% endif %}>Writing</a>
      <a href="{{ '/contact/' | relative_url }}" {% if path contains '/contact' %}class="active"{% endif %}>Contact</a>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle colour theme" title="Toggle light / dark">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
      </button>
    </nav>
  </div>
</header>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var root = document.documentElement;
      var current = root.getAttribute('data-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      var next = current === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
    });
  })();
</script>
